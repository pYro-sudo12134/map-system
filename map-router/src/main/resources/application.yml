spring:
  application:
    name: java-router

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      cache:
        time-to-live: 10s
  health:
    redis:
      enabled: true
    defaults:
      enabled: true

info:
  app:
    name: Map Router
    version: 0.0.1

logging:
  level:
    by.losik: INFO
    org.springframework.web: INFO
    org.apache.camel: INFO
    org.apache.camel.component.servlet: INFO

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevOnly}

aws:
  region: ${AWS_REGION:us-east-1}
  secret-key: ${AWS_SECRET_KEY:test}
  access-key: ${AWS_ACCESS_KEY:test}
  endpoint: ${AWS_ENDPOINT_URL:http://localhost:4566}
  s3:
    bucket: ${AWS_S3_BUCKET:voice-records}
  sqs:
    rag:
      name: ${SQS_RAG_NAME:SQS_RAG}
    results:
      name: ${SQS_RESULTS_NAME:SQS_RESULTS}
    sync:
      name: ${SQS_SYNC_NAME:SQS_SYNC}

rate:
  limit:
    admin:
      full-sync:
        max-requests: 1000
        time-period-ms: 60000
      nodes-sync:
        max-requests: 1000
        time-period-ms: 60000
      edges-sync:
        max-requests: 1000
        time-period-ms: 60000
    sqs-consumer:
      max-requests: 300
      time-period-ms: 1000
    user:
      global:
        max-requests: 200
        time-period-ms: 1000
      get-result:
        max-requests: 100
        time-period-ms: 1000
      per-user:
        max-requests: 200
        time-period-ms: 1000

resilience4j:
  circuitbreaker:
    instances:
      sqs-processor:
        failure-rate-threshold: 40
        sliding-window-size: 20
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 60000
        permitted-number-of-calls-in-half-open-state: 5
      transcribe:
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30000
        permitted-number-of-calls-in-half-open-state: 3
      s3-upload:
        failure-rate-threshold: 40
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 15000


camel:
  servlet:
    mapping:
      context-path: /api/*
  component:
    aws2-sqs:
      access-key: ${aws.access-key}
      secret-key: ${aws.secret-key}
      region: ${aws.region}
      override-endpoint: true
      uri-endpoint-override: ${aws.endpoint}
    aws2-s3:
      force-path-style: true
      access-key: ${aws.access-key}
      secret-key: ${aws.secret-key}
      region: ${aws.region}
      override-endpoint: true
      uri-endpoint-override: ${aws.endpoint}
    aws2-transcribe:
      access-key: ${aws.access-key}
      secret-key: ${aws.secret-key}
      region: ${aws.region}
      override-endpoint: true
      uri-endpoint-override: ${aws.endpoint}