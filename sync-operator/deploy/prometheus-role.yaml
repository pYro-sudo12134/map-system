apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sync-operator-alerts
  namespace: monitoring
spec:
  groups:
    - name: sync-operator.rules
      rules:
        - alert: SQSSyncQueueTooLong
          expr: sqs_sync_queue_length{queue_name="SQS_SYNC"} > 10
          for: 30s
          labels:
            severity: warning
            component: sync
          annotations:
            summary: "SQS_SYNC queue is too long ({{ $value }} messages)"
            description: "Queue length is above threshold for 30 seconds"

        - alert: SQSSyncQueueVeryLong
          expr: sqs_sync_queue_length{queue_name="SQS_SYNC"} > 50
          for: 30s
          labels:
            severity: critical
            component: sync
          annotations:
            summary: "SQS_SYNC queue is very long ({{ $value }} messages)"
            description: "Immediate scaling required"