apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: openfaas
data:
  alertmanager.yml: |
    receivers:
      - name: 'scale-faas-s'
        webhook_configs:
          - url: 'http://faasnetes.openfaas.svc.cluster.local:8080/system/scale-function/faas-s'
            send_resolved: false
    
    route:
      receiver: 'scale-faas-s'
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 5s
      repeat_interval: 30s
      routes:
        - match:
            alertname: 'SQSQueueTooLong'
          receiver: 'scale-faas-s'