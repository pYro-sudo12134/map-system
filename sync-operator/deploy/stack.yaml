version: 1.0

provider:
  name: openfaas
  gateway: http://localhost:8089

functions:
  faas-s:
    lang: dockerfile
    handler: ../../sync-faas
    image: pyrodocker1/faas-s:0.1
    environment:
      NEO4J_URI: bolt://172.17.0.1:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test1234
      OPENSEARCH_URL: http://172.17.0.1:9200
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: admin
      OPENSEARCH_NODES_INDEX: nodes
      OPENSEARCH_EDGES_INDEX: edges
      SQS_SYNC_RESULTS_URL: https://172.17.0.1:4566/000000000000/SQS_SYNC_RESULTS
      AWS_ENDPOINT_URL: http://172.17.0.1:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    labels:
      faas_function: faas-s
    annotations:
      prometheus.io.scrape: "true"
    limits:
      memory: 256Mi
    requests:
      memory: 128Mi

# faas-cli up -f stack.yaml