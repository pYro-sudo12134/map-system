apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "map-operator.fullname" . }}-config
  labels:
  {{- include "map-operator.labels" . | nindent 4 }}
data:
  AWS_ENDPOINT_URL: {{ .Values.config.awsEndpointUrl | quote }}
  AWS_REGION: {{ .Values.config.awsRegion | quote }}
  CHECK_INTERVAL: {{ .Values.config.checkInterval | quote }}
  QUEUE_NAME: {{ .Values.config.queueName | quote }}
  SQS_GO_URL: {{ .Values.config.sqsGoUrl | quote }}
