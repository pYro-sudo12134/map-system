apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: ensure-pdb-hpa-consistency
spec:
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets"]
  validations:
    - expression: |
        !has(object.metadata.annotations) ||
        !('hpa-enabled' in object.metadata.annotations) ||
        !('pdb-enabled' in object.metadata.annotations) ||
        true
      message: "When using both HPA and PDB, ensure maxUnavailable in PDB is >= tolerance for scaling down"
      reason: "Invalid"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: ensure-pdb-hpa-consistency
spec:
  policyName: ensure-pdb-hpa-consistency
  validationActions: [Warn, Audit]
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - ism-system
            - database
            - ism-rag
            - openfaas-fn
            - openfaas
            - ism-mq
            - ingress