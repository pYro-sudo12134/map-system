apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: validate-pdb-config
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["policy"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["poddisruptionbudgets"]
  validations:
    - expression: |
        !has(object.spec.maxUnavailable) ||
        object.spec.maxUnavailable != 0 ||
        (has(object.spec.minAvailable) && object.spec.minAvailable == "100%")
      message: "maxUnavailable cannot be 0 unless minAvailable is '100%' (which would block all voluntary disruptions)"
      reason: "Invalid"
    - expression: |
        has(object.spec.selector) &&
        has(object.spec.selector.matchLabels)
      message: "PDB must have spec.selector.matchLabels to match workload pods"
      reason: "Required"
    - expression: |
        !has(object.metadata.namespace) ||
        object.metadata.namespace != "database" ||
        (
          has(object.spec.minAvailable) &&
          (object.spec.minAvailable == 1 || object.spec.minAvailable == "50%")
        )
      message: "In 'database' namespace, PDB should have minAvailable=1 or '50%' for HA"
      reason: "Recommended"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: validate-pdb-config
spec:
  policyName: validate-pdb-config
  validationActions: [Deny, Audit]
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - database
            - ism-system
            - ism-rag
            - openfaas-fn
            - openfaas
            - ism-mq
            - ingress