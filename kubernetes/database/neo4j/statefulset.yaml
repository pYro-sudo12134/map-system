apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: database
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
#      tolerations:
#        - key: "node-role.kubernetes.io/CHANGE_ME"
#          operator: "Equal"
#          value: "true"
#          effect: "NoSchedule"
#      affinity:
#        nodeAffinity:
#          requiredDuringSchedulingIgnoredDuringExecution:
#            nodeSelectorTerms:
#              - matchExpressions:
#                  - key: node-role.kubernetes.io/CHANGE_ME
#                    operator: Exists
#          preferredDuringSchedulingIgnoredDuringExecution:
#            - weight: 100
#              preference:
#                matchExpressions:
#                  - key: kubernetes.io/hostname
#                    operator: In
#                    values:
#                      - CHANGE_ME
      serviceAccountName: neo4j-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: neo4j
          image: neo4j:5.21-community
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7687
              name: bolt
              protocol: TCP
            - containerPort: 7474
              name: http
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: NEO4J_AUTH
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_memory_pagecache_size
              value: "512M"
            - name: NEO4J_dbms_memory_heap_initial__size
              value: "512M"
            - name: NEO4J_dbms_memory_heap_max__size
              value: "1G"
            - name: NEO4J_dbms_security_procedures_unrestricted
              value: "apoc.*"
            - name: NEO4J_dbms_security_procedures_allowlist
              value: "apoc.*"
            - name: NEO4J_server_config_strict__validation_enabled
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
            - name: plugins
              mountPath: /plugins
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo4j-pvc-data
        - name: logs
          persistentVolumeClaim:
            claimName: neo4j-pvc-logs
        - name: plugins
          persistentVolumeClaim:
            claimName: neo4j-pvc-plugins