apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: database
spec:
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-headless
  namespace: database
spec:
  clusterIP: None
  selector:
    app: neo4j
  ports:
    - port: 7687
      targetPort: 7687