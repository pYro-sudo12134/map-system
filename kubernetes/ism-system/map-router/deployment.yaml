apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-router
  namespace: ism-system
  labels:
    app: map-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: map-router
  template:
    metadata:
      labels:
        app: map-router
    spec:
#      tolerations:
#        - key: "node-role.kubernetes.io/CHANGE_ME"
#          operator: "Equal"
#          value: "true"
#          effect: "NoSchedule"
#      affinity:
#        nodeAffinity:
#          requiredDuringSchedulingIgnoredDuringExecution:
#            nodeSelectorTerms:
#              - matchExpressions:
#                  - key: node-role.kubernetes.io/storage
#                    operator: Exists
#          preferredDuringSchedulingIgnoredDuringExecution:
#            - weight: 100
#              preference:
#                matchExpressions:
#                  - key: kubernetes.io/hostname
#                    operator: In
#                    values:
#                      - CHANGE_ME
      serviceAccountName: map-router-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: map-router
          image: pyrodocker1/map-router:0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  key: REDIS_HOST
                  name: map-operator-config
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  key: REDIS_PORT
                  name: map-operator-config
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: router-secret
                  key: REDIS_PASSWORD
            - name: AWS_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  key: AWS_ENDPOINT_URL
                  name: map-operator-config
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  key: AWS_REGION
                  name: map-operator-config
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  key: AWS_S3_BUCKET
                  name: map-operator-config
            - name: SQS_RAG_NAME
              valueFrom:
                configMapKeyRef:
                  key: SQS_RAG_NAME
                  name: map-operator-config
            - name: SQS_RESULTS_NAME
              valueFrom:
                configMapKeyRef:
                  key: SQS_RESULTS_NAME
                  name: map-operator-config
            - name: SQS_SYNC_NAME
              valueFrom:
                configMapKeyRef:
                  key: SQS_SYNC_NAME
                  name: map-operator-config
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
