  QUEUE_GO_URL: http://localstack.ism-mq.svc.cluster.local:4566/000000000000/SQS_GO
  DLQ_URL: http://localstack.ism-mq.svc.cluster.local:4566/000000000000/DLQ
  AWS_REGION: us-east-1
  SIMILARITY_THRESHOLD: 0.85
  KNN_SIZE: 5
  MAX_RETRIES: 3
  VISIBILITY_TIMEOUT: 60