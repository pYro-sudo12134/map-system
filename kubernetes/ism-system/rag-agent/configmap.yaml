  OLLAMA_MODEL: llama3.2:3b
  OLLAMA_TEMPERATURE: 0.1
  OLLAMA_MAX_TOKENS: 500
  OPENSEARCH_URL: http://opensearch.database.svc.cluster.local:9200
  OPENSEARCH_INDEX: rag_queries
